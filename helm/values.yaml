replicaCount: 8

image:
  repository: 061039803094.dkr.ecr.us-east-1.amazonaws.com/ignite-sol
  tag: latest
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 8080
  targetPort: 8080

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 60

priorityClassName: high-priority-app